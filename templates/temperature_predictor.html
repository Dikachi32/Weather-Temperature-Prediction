<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather — Temperature Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep:      #080d14;
            --bg-card:      rgba(14, 22, 38, 0.72);
            --border:       rgba(99, 170, 255, 0.12);
            --border-focus: rgba(99, 170, 255, 0.45);
            --accent:       #4fa3e8;
            --accent-glow:  rgba(79, 163, 232, 0.28);
            --accent-2:     #7ee8d4;
            --text-primary: #e8f0fa;
            --text-muted:   rgba(200, 220, 248, 0.45);
            --input-bg:     rgba(10, 20, 40, 0.6);
            --label:        rgba(200, 220, 248, 0.6);
            --result-grad:  linear-gradient(135deg, #4fa3e8 0%, #7ee8d4 100%);
        }

        html, body {
            min-height: 100vh;
            background: var(--bg-deep);
            font-family: 'DM Sans', sans-serif;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(30,80,160,0.22) 0%, transparent 65%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(20,120,140,0.18) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 55% 45%, rgba(10,40,100,0.30) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image:
                radial-gradient(1px 1px at 18% 22%, rgba(255,255,255,0.35) 0%, transparent 100%),
                radial-gradient(1px 1px at 72% 14%, rgba(255,255,255,0.25) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 40% 68%, rgba(255,255,255,0.20) 0%, transparent 100%),
                radial-gradient(1px 1px at 88% 55%, rgba(255,255,255,0.30) 0%, transparent 100%),
                radial-gradient(1px 1px at 8%  80%, rgba(255,255,255,0.18) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 92%, rgba(255,255,255,0.22) 0%, transparent 100%);
            pointer-events: none;
        }

        .page-wrap {
            position: relative; z-index: 1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 20px;
        }

        .card {
            width: 100%;
            max-width: 540px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.04) inset,
                0 40px 80px rgba(0,0,0,0.55),
                0 0 60px rgba(30,90,180,0.08);
            animation: rise 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Card Body ── */
        .card-body { padding: 44px 44px 40px; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--accent);
            background: rgba(79,163,232,0.1);
            border: 1px solid rgba(79,163,232,0.22);
            border-radius: 100px;
            padding: 5px 13px;
            margin-bottom: 18px;
        }

        .badge-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent-2);
            box-shadow: 0 0 6px var(--accent-2);
            animation: pulse 2.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.55; transform: scale(0.8); }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 27px;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: 9px;
        }

        h1 span {
            background: var(--result-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 13.5px;
            font-weight: 300;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--border) 30%, var(--border) 70%, transparent 100%);
            margin-bottom: 26px;
        }

        /* ── Form ── */
        .fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 26px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 7px;
            animation: rise 0.7s cubic-bezier(0.22,1,0.36,1) both;
        }

        .field:nth-child(1) { animation-delay: 0.08s; }
        .field:nth-child(2) { animation-delay: 0.12s; }
        .field:nth-child(3) { animation-delay: 0.16s; }
        .field:nth-child(4) { animation-delay: 0.20s; }
        .field:nth-child(5) { animation-delay: 0.24s; }
        .field:nth-child(6) { animation-delay: 0.28s; }

        label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--label);
        }

        .input-wrap { position: relative; }

        .input-icon {
            position: absolute;
            left: 12px; top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.45;
            pointer-events: none;
        }

        input[type="text"] {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 11px 10px 34px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        input[type="text"]::placeholder {
            color: rgba(200,220,248,0.22);
            font-size: 12.5px;
        }

        input[type="text"]:focus {
            border-color: var(--border-focus);
            background: rgba(15,30,60,0.75);
            box-shadow: 0 0 0 3px var(--accent-glow), 0 0 18px rgba(79,163,232,0.08);
        }

        /* ── Submit ── */
        .submit-btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #2e7dd1 0%, #3ab8a4 100%);
            color: #fff;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.03em;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
            box-shadow: 0 4px 24px rgba(46,125,209,0.35), 0 0 0 1px rgba(255,255,255,0.08) inset;
        }

        .submit-btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.14) 0%, transparent 60%);
            pointer-events: none;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(46,125,209,0.5), 0 0 0 1px rgba(255,255,255,0.12) inset;
            filter: brightness(1.06);
        }

        .submit-btn:active { transform: translateY(0); filter: brightness(0.96); }

        .submit-btn span {
            position: relative;
            display: flex; align-items: center; justify-content: center;
            gap: 9px;
        }

        .btn-arrow { transition: transform 0.2s; }
        .submit-btn:hover .btn-arrow { transform: translateX(4px); }

        /* ── Result ── */
        .result-box {
            margin-top: 24px;
            padding: 22px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(46,125,209,0.12) 0%, rgba(58,184,164,0.10) 100%);
            border: 1px solid rgba(79,163,232,0.2);
            display: flex; align-items: center; gap: 16px;
            animation: rise 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }

        .result-icon {
            width: 50px; height: 50px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(79,163,232,0.2), rgba(126,232,212,0.15));
            border: 1px solid rgba(79,163,232,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }

        .result-label {
            font-size: 10.5px;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .result-value {
            font-family: 'Syne', sans-serif;
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: var(--result-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        /* ── Footer ── */
        .card-footer {
            padding: 18px 28px;
            border-top: 1px solid var(--border);
            background: rgba(8,14,26,0.50);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
        }

        /* Profile picture in footer */
        .footer-left {
            display: flex;
            align-items: center;
            gap: 11px;
        }

        .footer-avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .footer-avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 2px solid transparent;
            background:
                linear-gradient(var(--bg-deep), var(--bg-deep)) padding-box,
                linear-gradient(135deg, #4fa3e8, #7ee8d4) border-box;
            transition: transform 0.3s;
        }

        .footer-avatar-fallback {
            width: 38px; height: 38px;
            border-radius: 50%;
            border: 2px solid rgba(79,163,232,0.4);
            background: linear-gradient(135deg, #2e7dd1, #3ab8a4);
            display: none;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 800;
            color: #fff;
            flex-shrink: 0;
        }

        .footer-avatar-wrap:hover .footer-avatar,
        .footer-avatar-wrap:hover .footer-avatar-fallback {
            transform: scale(1.08);
        }

        /* subtle halo around footer avatar */
        .footer-avatar-halo {
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 1px solid rgba(79,163,232,0.22);
            animation: ring-pulse 3s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes ring-pulse {
            0%, 100% { opacity: 0.35; transform: scale(1); }
            50%       { opacity: 1;   transform: scale(1.06); }
        }

        .footer-credit { display: flex; flex-direction: column; }

        .footer-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            font-family: 'Syne', sans-serif;
            letter-spacing: -0.01em;
        }

        .footer-tag {
            font-size: 11px;
            color: var(--accent);
            font-weight: 300;
            margin-top: 1px;
        }

        /* ── Social Icons ── */
        .social-links {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .social-link {
            width: 34px; height: 34px;
            border-radius: 9px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
            color: var(--text-muted);
            transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .social-link::before {
            content: '';
            position: absolute; inset: 0;
            opacity: 0;
            transition: opacity 0.25s;
            border-radius: 9px;
        }

        .social-link.twitter::before  { background: linear-gradient(135deg, rgba(29,161,242,0.25), rgba(29,161,242,0.06)); }
        .social-link.linkedin::before { background: linear-gradient(135deg, rgba(10,102,194,0.25), rgba(10,102,194,0.06)); }
        .social-link.facebook::before { background: linear-gradient(135deg, rgba(24,119,242,0.25), rgba(24,119,242,0.06)); }

        .social-link:hover {
            transform: translateY(-5px) scale(1.12);
            border-color: rgba(99,170,255,0.35);
        }

        .social-link:hover::before { opacity: 1; }

        .social-link.twitter:hover  { box-shadow: 0 8px 22px rgba(29,161,242,0.38);  color: #1da1f2; }
        .social-link.linkedin:hover { box-shadow: 0 8px 22px rgba(10,102,194,0.38);  color: #0a66c2; }
        .social-link.facebook:hover { box-shadow: 0 8px 22px rgba(24,119,242,0.38);  color: #1877f2; }

        .social-link svg {
            width: 15px; height: 15px;
            fill: currentColor;
            position: relative; z-index: 1;
            transition: transform 0.25s;
        }

        .social-link:hover svg { transform: scale(1.18); }

        .social-link:nth-child(1) { animation: rise 0.5s 0.35s cubic-bezier(0.22,1,0.36,1) both; }
        .social-link:nth-child(2) { animation: rise 0.5s 0.45s cubic-bezier(0.22,1,0.36,1) both; }
        .social-link:nth-child(3) { animation: rise 0.5s 0.55s cubic-bezier(0.22,1,0.36,1) both; }

        @media (max-width: 480px) {
            .card-body { padding: 30px 22px 32px; }
            .fields { grid-template-columns: 1fr; gap: 14px; }
            h1 { font-size: 22px; }
            .card-footer { flex-direction: column; align-items: flex-start; gap: 14px; }
        }
    </style>
</head>
<body>

<div class="page-wrap">
    <div class="card">

        <!-- ── Main Body ── -->
        <div class="card-body">

            <div class="badge">
                <span class="badge-dot"></span>
                ML Model Active
            </div>

            <h1>Weather <span>Temperature</span> Predictor</h1>
            <p class="subtitle">
                Enter atmospheric conditions below and the model will forecast the expected surface temperature.
            </p>

            <div class="divider"></div>

            <form action="" method="post">
                <div class="fields">
                    <div class="field">
                        <label for="day">Day</label>
                        <div class="input-wrap">
                            <span class="input-icon">📅</span>
                            <input type="text" id="day" name="day" placeholder="e.g. 120">
                        </div>
                    </div>
                    <div class="field">
                        <label for="humidity">Humidity (%)</label>
                        <div class="input-wrap">
                            <span class="input-icon">💧</span>
                            <input type="text" id="humidity" name="humidity" placeholder="e.g. 78">
                        </div>
                    </div>
                    <div class="field">
                        <label for="pressure">Pressure (hPa)</label>
                        <div class="input-wrap">
                            <span class="input-icon">🌡</span>
                            <input type="text" id="pressure" name="pressure" placeholder="e.g. 1028">
                        </div>
                    </div>
                    <div class="field">
                        <label for="wind_speed">Wind Speed (km/h)</label>
                        <div class="input-wrap">
                            <span class="input-icon">💨</span>
                            <input type="text" id="wind_speed" name="wind_speed" placeholder="e.g. 15">
                        </div>
                    </div>
                    <div class="field">
                        <label for="rainfall">Rainfall (mm)</label>
                        <div class="input-wrap">
                            <span class="input-icon">🌧</span>
                            <input type="text" id="rainfall" name="rainfall" placeholder="e.g. 7.3">
                        </div>
                    </div>
                    <div class="field">
                        <label for="sunlight">Sunlight (hours)</label>
                        <div class="input-wrap">
                            <span class="input-icon">☀️</span>
                            <input type="text" id="sunlight" name="sunlight" placeholder="e.g. 4.4">
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn">
                    <span>Run Prediction <span class="btn-arrow">→</span></span>
                </button>
            </form>

            {% if prediction %}
            <div class="result-box">
                <div class="result-icon">🌡️</div>
                <div>
                    <div class="result-label">Predicted Temperature</div>
                    <div class="result-value">{{ prediction }} °C</div>
                </div>
            </div>
            {% endif %}

        </div>

        <!-- ── Footer ── -->
        <div class="card-footer">

            <!-- Profile pic pulled from Twitter/X -->
            <div class="footer-left">
                <div class="footer-avatar-wrap">
                    <img
                        class="footer-avatar"
                        src="https://unavatar.io/twitter/Baron_dikachi"
                        alt="Dikachi Baron"
                        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                    >
                    <div class="footer-avatar-fallback">DB</div>
                    <div class="footer-avatar-halo"></div>
                </div>
                <div class="footer-credit">
                    <span class="footer-name">Dikachi Baron</span>
                    <span class="footer-tag">Built by @dikachi32</span>
                </div>
            </div>

            <!-- Social links -->
            <div class="social-links">
                <a class="social-link twitter"
                   href="https://x.com/Baron_dikachi"
                   target="_blank" rel="noopener noreferrer"
                   title="Follow on X / Twitter">
                    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.261 5.633 5.903-5.633Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                </a>
                <a class="social-link linkedin"
                   href="https://www.linkedin.com/in/dikachi-sunday-a4a380356"
                   target="_blank" rel="noopener noreferrer"
                   title="Connect on LinkedIn">
                    <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                </a>
                <a class="social-link facebook"
                   href="https://www.facebook.com/share/18H6wLY1fW/"
                   target="_blank" rel="noopener noreferrer"
                   title="Find on Facebook">
                    <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                </a>
            </div>

        </div>

    </div>
</div>

</body>
</html>
